<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ShopSmart</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<div class="logo">ShopSmart</div>

<nav>
<div class="menu" onclick="toggleMenu()">☰</div>
<ul id="nav">
<li><a href="#">Home</a></li>
<li><a href="#products">Products</a></li>
<li><a href="#cart-section">🛒 <span id="cart">0</span></a></li>
</ul>
</nav>
</header>


<section class="hero">
<div>
<h1>Shop Smarter, Live Better</h1>
<p>Premium products at affordable prices</p>
<button onclick="scrollProducts()">Explore Products</button>
</div>
</section>


<section>
<div class="title"><h2>Categories</h2></div>

<div class="category-container">
<div class="category">💻<h3>Electronics</h3></div>
<div class="category">👕<h3>Fashion</h3></div>
<div class="category">🛒<h3>Groceries</h3></div>
<div class="category">📚<h3>Books</h3></div>
</div>

</section>


<section id="products-section">

<div class="title"><h2>Products</h2></div>

<div class="search-box">
<input id="search" placeholder="Search products">
</div>

<div class="products" id="products"></div>

</section>


<section id="cart-section">

<div class="title"><h2>Your Cart</h2></div>

<div id="cart-list"></div>

</section>


<section>

<div class="deal">
<h2>Mega Sale</h2>
<p>Up to 50% discount available</p>
</div>

</section>


<footer>
<h3>ShopSmart</h3>
<p>© 2026 All Rights Reserved</p>
</footer>



<script>

let allProducts=[];
let cartItems=[];

function toggleMenu(){
document.getElementById("nav").classList.toggle("active");
}


async function getProducts(){

let res=await fetch("https://fakestoreapi.com/products");
allProducts=await res.json();
displayProducts(allProducts);

}


function displayProducts(products){
let box=document.getElementById("products");
box.innerHTML="";
products.slice(0,12).forEach(p=>{
box.innerHTML+=`
<div class="product">
<img src="${p.image}">
<h3>${p.title.slice(0,45)}</h3>
<div class="price">$${p.price}</div><br>
<button onclick="addCart(${p.id})">
Add To Cart
</button>
</div>
`;

});

}

function addCart(id){
let product=allProducts.find(p=>p.id===id);
cartItems.push(product);
document.getElementById("cart").innerHTML=cartItems.length;
showCart();

}

function showCart(){
let box=document.getElementById("cart-list");
box.innerHTML="";
cartItems.forEach((p,i)=>{
box.innerHTML+=`
<div class="product">
<img src="${p.image}">
<h3>${p.title.slice(0,40)}</h3>
<div class="price">$${p.price}</div><br>
<button onclick="removeCart(${i})">
Remove
</button>

</div>

`;

});

}

function removeCart(i){
cartItems.splice(i,1);
document.getElementById("cart").innerHTML=cartItems.length;
showCart();
}

document.getElementById("search").oninput=function(){
let v=this.value.toLowerCase();
displayProducts(
allProducts.filter(p=>p.title.toLowerCase().includes(v))
);

}

function scrollProducts(){
document.getElementById("products-section")
.scrollIntoView({behavior:"smooth"});

}

getProducts();

</script>

</body>
</html>
